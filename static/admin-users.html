<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户管理台</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: rgba(255,255,255,0.94);
      --text: #14213d;
      --muted: #667085;
      --line: #e6ebf2;
      --primary: #1768ff;
      --primary-deep: #0f52d6;
      --success: #0f9f6e;
      --danger: #d64545;
      --shadow: 0 18px 50px rgba(20, 33, 61, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(23, 104, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }
    .page { max-width: 1380px; margin: 0 auto; padding: 32px 20px 48px; }
    .hero { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; margin-bottom: 24px; }
    .hero h1 { margin: 0; font-size: 32px; font-weight: 700; }
    .hero p { margin: 10px 0 0; color: var(--muted); font-size: 14px; }
    .hero-meta { padding: 14px 18px; border-radius: 16px; background: var(--card); box-shadow: var(--shadow); color: var(--muted); font-size: 13px; }
    .layout { display: grid; grid-template-columns: 420px 1fr; gap: 18px; }
    .panel { border-radius: 24px; background: var(--card); box-shadow: var(--shadow); overflow: hidden; }
    .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 18px 18px 12px; border-bottom: 1px solid var(--line); }
    .panel-head h2 { margin: 0; font-size: 18px; }
    .panel-body { padding: 18px; }
    .form-grid { display: grid; gap: 12px; }
    .toolbar, .inline-toolbar, .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .toolbar { margin-bottom: 14px; }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
    select, input, button {
      width: 100%;
      border: 1px solid var(--line); border-radius: 12px; height: 42px; padding: 0 14px; font-size: 14px; background: #fff;
    }
    button { width: auto; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease; }
    button:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(23,104,255,0.14); }
    .btn-primary { color: #fff; border-color: var(--primary); background: linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%); }
    .btn-success { color: #fff; border-color: var(--success); background: linear-gradient(135deg, #19ab73 0%, var(--success) 100%); }
    .btn-danger { color: #fff; border-color: var(--danger); background: linear-gradient(135deg, #ef6a6a 0%, var(--danger) 100%); }
    .hint, .meta, .small { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .list { display: grid; gap: 12px; }
    .card { border: 1px solid var(--line); border-radius: 18px; padding: 16px; background: rgba(255,255,255,0.95); }
    .card.active { border-color: rgba(23,104,255,0.35); box-shadow: 0 12px 30px rgba(23,104,255,0.12); }
    .card-title { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .card-title strong { font-size: 16px; }
    .pill { display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; color: var(--primary); background: rgba(23,104,255,0.12); }
    .empty { padding: 56px 16px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 18px; }
    .toast {
      position: fixed; right: 20px; bottom: 20px; min-width: 220px; max-width: 360px; padding: 14px 16px; border-radius: 14px;
      background: rgba(20,33,61,0.96); color: #fff; box-shadow: 0 18px 48px rgba(20,33,61,0.24);
      opacity: 0; pointer-events: none; transform: translateY(12px); transition: all .18s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>用户管理台</h1>
        <p>支持创建普通用户、分销商用户，并支持删除用户。</p>
      </div>
      <div class="hero-meta" id="heroMeta">正在加载用户列表...</div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2>创建用户</h2>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <div>
              <label for="openidInput">openid</label>
              <input id="openidInput" type="text" placeholder="必填，需唯一" />
            </div>
            <div>
              <label for="unionidInput">unionid</label>
              <input id="unionidInput" type="text" placeholder="可选" />
            </div>
            <div>
              <label for="nicknameInput">昵称</label>
              <input id="nicknameInput" type="text" placeholder="可选" />
            </div>
            <div>
              <label for="phoneInput">手机号掩码</label>
              <input id="phoneInput" type="text" placeholder="例如 138****0000" />
            </div>
            <div>
              <label for="roleSelect">用户类型</label>
              <select id="roleSelect">
                <option value="user">普通用户</option>
                <option value="distributor">分销商用户</option>
              </select>
            </div>
            <div>
              <label for="levelSelect">分销层级</label>
              <select id="levelSelect">
                <option value="campus">campus</option>
                <option value="city">city</option>
                <option value="strategic">strategic</option>
              </select>
            </div>
            <div>
              <label for="parentIdInput">父级分销商 UID</label>
              <input id="parentIdInput" type="number" min="0" step="1" placeholder="普通用户可留空" />
            </div>
            <div>
              <label for="quotaInput">初始配额</label>
              <input id="quotaInput" type="number" min="0" step="1" value="0" />
            </div>
          </div>
          <div class="toolbar" style="margin-top:16px;">
            <button class="btn-success" id="createButton">创建用户</button>
          </div>
          <div class="hint">创建分销商时可选填直属上级和初始配额。普通用户不会创建分销资料。</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>用户列表</h2>
          <div class="inline-toolbar">
            <select id="roleFilter">
              <option value="">全部</option>
              <option value="user">普通用户</option>
              <option value="distributor">分销商</option>
              <option value="admin">管理员</option>
            </select>
            <input id="keywordInput" type="text" placeholder="搜索 UID / 昵称 / openid / 手机" style="width:240px;" />
            <button class="btn-primary" id="searchButton">搜索</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="hint">管理员用户不允许删除。带直属下级的分销商也不允许直接删除。</div>
          <div class="list" id="userList">
            <div class="empty">正在加载用户...</div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      users: [],
      keyword: "",
      role: "",
      selectedUser: null,
    };

    const heroMeta = document.getElementById("heroMeta");
    const userList = document.getElementById("userList");
    const roleSelect = document.getElementById("roleSelect");
    const levelSelect = document.getElementById("levelSelect");
    const toast = document.getElementById("toast");

    function showToast(message, isError = false) {
      toast.textContent = message;
      toast.style.background = isError ? "rgba(160, 34, 34, 0.96)" : "rgba(20, 33, 61, 0.96)";
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.code !== 0) {
        throw new Error(payload.message || `请求失败: ${response.status}`);
      }
      return payload;
    }

    function syncDistributorFields() {
      const isDistributor = roleSelect.value === "distributor";
      levelSelect.disabled = !isDistributor;
      document.getElementById("parentIdInput").disabled = !isDistributor;
      document.getElementById("quotaInput").disabled = !isDistributor;
    }

    function renderUsers() {
      if (!state.users.length) {
        userList.innerHTML = '<div class="empty">没有匹配的用户</div>';
        return;
      }
      userList.innerHTML = state.users.map(user => `
        <div class="card ${state.selectedUser && state.selectedUser.user_id === user.user_id ? "active" : ""}" data-user-id="${user.user_id}">
          <div class="card-title">
            <div>
              <strong>${user.nickname || "未命名用户"}</strong>
              <div class="small">UID: ${user.user_id}</div>
            </div>
            <span class="pill">${user.role}</span>
          </div>
          <div class="meta">openid: ${user.openid}</div>
          <div class="meta">手机号: ${user.phone_masked || "-"} / unionid: ${user.unionid || "-"}</div>
          <div class="meta">分销层级: ${user.distributor_level || "-"} / 父级 UID: ${user.parent_distributor_id || "-"}</div>
          <div class="meta">配额总量 ${user.quota_total || 0} / 已分配 ${user.quota_used || 0}</div>
          <div class="actions">
            <button class="btn-danger" data-delete-id="${user.user_id}" ${user.role === "admin" ? "disabled" : ""}>删除用户</button>
          </div>
        </div>
      `).join("");
    }

    async function loadUsers() {
      const params = new URLSearchParams({ page: "1", page_size: "100" });
      if (state.keyword) params.set("keyword", state.keyword);
      if (state.role) params.set("role", state.role);
      const payload = await requestJson(`/api/v1/admin/users?${params.toString()}`);
      state.users = payload.data.list;
      renderUsers();
      heroMeta.textContent = `已加载 ${state.users.length} 个用户`;
    }

    async function createUser() {
      const payload = {
        openid: document.getElementById("openidInput").value.trim(),
        unionid: document.getElementById("unionidInput").value.trim(),
        nickname: document.getElementById("nicknameInput").value.trim(),
        phone_masked: document.getElementById("phoneInput").value.trim(),
        role: roleSelect.value,
        distributor_level: levelSelect.value,
        parent_distributor_id: Number(document.getElementById("parentIdInput").value || 0),
        quota_total: Number(document.getElementById("quotaInput").value || 0),
      };
      const result = await requestJson("/api/v1/admin/users", {
        method: "POST",
        body: JSON.stringify(payload),
      });
      showToast(`创建成功：UID ${result.data.user_id}`);
      await loadUsers();
    }

    async function deleteUser(userId) {
      const result = await requestJson(`/api/v1/admin/users/${userId}/delete`, {
        method: "POST",
        body: JSON.stringify({}),
      });
      showToast(`删除成功：UID ${result.data.user_id}`);
      await loadUsers();
    }

    roleSelect.addEventListener("change", syncDistributorFields);
    document.getElementById("createButton").addEventListener("click", async () => {
      try {
        await createUser();
      } catch (error) {
        showToast(error.message || "创建失败", true);
      }
    });
    document.getElementById("searchButton").addEventListener("click", async () => {
      state.keyword = document.getElementById("keywordInput").value.trim();
      state.role = document.getElementById("roleFilter").value;
      try {
        await loadUsers();
      } catch (error) {
        showToast(error.message || "加载失败", true);
      }
    });
    userList.addEventListener("click", async (event) => {
      const card = event.target.closest("[data-user-id]");
      if (card) {
        const userId = Number(card.dataset.userId);
        state.selectedUser = state.users.find(item => item.user_id === userId) || null;
        renderUsers();
      }
      const button = event.target.closest("[data-delete-id]");
      if (!button) return;
      try {
        await deleteUser(Number(button.dataset.deleteId));
      } catch (error) {
        showToast(error.message || "删除失败", true);
      }
    });

    syncDistributorFields();
    loadUsers().catch((error) => {
      heroMeta.textContent = "页面初始化失败";
      showToast(error.message || "加载失败", true);
    });
  </script>
</body>
</html>
