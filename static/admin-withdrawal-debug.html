<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提现调试台</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: rgba(255,255,255,0.94);
      --text: #14213d;
      --muted: #667085;
      --line: #e6ebf2;
      --primary: #1768ff;
      --primary-deep: #0f52d6;
      --success: #0f9f6e;
      --danger: #d64545;
      --shadow: 0 18px 50px rgba(20, 33, 61, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(23, 104, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }
    .page { max-width: 1320px; margin: 0 auto; padding: 32px 20px 48px; }
    .hero { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; margin-bottom: 24px; }
    .hero h1 { margin: 0; font-size: 32px; }
    .hero p { margin: 10px 0 0; color: var(--muted); font-size: 14px; }
    .hero-meta, .panel { background: var(--card); box-shadow: var(--shadow); border-radius: 20px; }
    .hero-meta { padding: 14px 18px; color: var(--muted); font-size: 13px; }
    .layout { display: grid; grid-template-columns: 420px 1fr; gap: 18px; }
    .panel { padding: 18px; }
    .panel h2 { margin: 0 0 14px; font-size: 18px; }
    .toolbar, .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .toolbar { margin-bottom: 14px; }
    input, select, button, textarea {
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
    }
    input, select, button { height: 42px; padding: 0 14px; }
    textarea { width: 100%; min-height: 86px; padding: 12px 14px; resize: vertical; }
    input { width: 100%; }
    button { cursor: pointer; }
    .btn-primary { color: #fff; border-color: var(--primary); background: linear-gradient(135deg, var(--primary), var(--primary-deep)); }
    .btn-success { color: #fff; border-color: var(--success); background: linear-gradient(135deg, #19ab73, var(--success)); }
    .btn-danger { color: #fff; border-color: var(--danger); background: linear-gradient(135deg, #ef6a6a, var(--danger)); }
    .meta, .hint { color: var(--muted); font-size: 13px; line-height: 1.7; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .stat { border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: rgba(255,255,255,0.95); }
    .stat-label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .stat-value { font-size: 18px; font-weight: 700; word-break: break-all; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
    .toast {
      position: fixed; right: 20px; bottom: 20px; min-width: 220px; max-width: 360px; padding: 14px 16px; border-radius: 14px;
      background: rgba(20,33,61,0.96); color: #fff; box-shadow: 0 18px 48px rgba(20,33,61,0.24);
      opacity: 0; pointer-events: none; transform: translateY(12px); transition: all .18s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 1080px) { .layout, .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>提现调试台</h1>
        <p>查看单条提现的当前状态、失败原因、回调参数，并支持手动模拟微信成功/失败回调。</p>
      </div>
      <div class="hero-meta" id="heroMeta">输入 `withdraw_id` 开始调试</div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>调试操作</h2>
        <div class="toolbar">
          <input id="withdrawIdInput" type="text" placeholder="输入 withdraw_id，例如 WD20250426120000100001" />
          <button class="btn-primary" id="loadButton">加载详情</button>
        </div>
        <div class="toolbar">
          <select id="stateSelect">
            <option value="SUCCESS">模拟成功回调</option>
            <option value="FAILED">模拟失败回调</option>
          </select>
          <button class="btn-success" id="simulateButton">执行模拟回调</button>
        </div>
        <div>
          <textarea id="failReasonInput" placeholder="失败原因，可选。模拟失败回调时会写入 fail_reason。"></textarea>
        </div>
        <div class="hint" style="margin-top:12px;">
          推荐排查顺序：
          1. 看当前 `status`
          2. 看 `transfer_bill_no` 和 `fail_reason`
          3. 看是否处于 `processing`
          4. 确认回调 URL 是否配置
          5. 必要时手动模拟回调验证状态流转
        </div>
      </section>

      <section class="panel">
        <h2>提现详情</h2>
        <div class="grid" id="detailGrid">
          <div class="stat"><div class="stat-label">暂无数据</div><div class="stat-value">-</div></div>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let current = null;
    const heroMeta = document.getElementById("heroMeta");
    const toast = document.getElementById("toast");
    const detailGrid = document.getElementById("detailGrid");

    function showToast(message, isError = false) {
      toast.textContent = message;
      toast.style.background = isError ? "rgba(160, 34, 34, 0.96)" : "rgba(20, 33, 61, 0.96)";
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.code !== 0) {
        throw new Error(payload.message || `请求失败: ${response.status}`);
      }
      return payload;
    }

    function renderDetail(data) {
      current = data;
      heroMeta.textContent = `当前提现：${data.withdraw_id} / 状态：${data.status}`;
      const diagnostics = data.diagnostics || {};
      const items = [
        ["withdraw_id", data.withdraw_id],
        ["状态", data.status],
        ["金额", `${data.amount_yuan} 元 (${data.amount} 分)`],
        ["用户", `${data.nickname} / UID ${data.user_id}`],
        ["openid", data.openid || "-"],
        ["提现渠道", data.channel_name || "-"],
        ["接收账号", `${data.receiver_name || "-"} / ${data.receiver_masked || "-"}`],
        ["提现创建时间", data.created_at || "-"],
        ["完成时间", data.completed_at || "-"],
        ["transfer_bill_no", data.transfer_bill_no || "-"],
        ["expected_out_bill_no", data.expected_out_bill_no || "-"],
        ["回调地址", data.expected_callback_url || "-"],
        ["失败原因", data.fail_reason || "-"],
        ["当前可提现余额", `${((data.withdrawable_balance_now || 0) / 100).toFixed(2)} 元`],
        ["累计已提现", `${((data.total_withdrawn_amount || 0) / 100).toFixed(2)} 元`],
        ["waiting_callback", String(!!diagnostics.waiting_callback)],
        ["is_terminal_status", String(!!diagnostics.is_terminal_status)],
        ["is_manual_review_status", String(!!diagnostics.is_manual_review_status)],
        ["has_openid", String(!!diagnostics.has_openid)],
        ["has_transfer_bill_no", String(!!diagnostics.has_transfer_bill_no)],
        ["callback_url_configured", String(!!diagnostics.callback_url_configured)],
        ["wechat_pay_client_configured", String(!!diagnostics.wechat_pay_client_configured)],
      ];
      detailGrid.innerHTML = items.map(([label, value]) => `
        <div class="stat">
          <div class="stat-label">${label}</div>
          <div class="stat-value code">${value ?? "-"}</div>
        </div>
      `).join("");
    }

    async function loadDetail() {
      const withdrawId = document.getElementById("withdrawIdInput").value.trim();
      if (!withdrawId) throw new Error("请输入 withdraw_id");
      const payload = await requestJson(`/api/v1/admin/distributor/withdrawals/${withdrawId}`);
      renderDetail(payload.data);
    }

    async function simulateCallback() {
      const withdrawId = document.getElementById("withdrawIdInput").value.trim();
      if (!withdrawId) throw new Error("请输入 withdraw_id");
      const state = document.getElementById("stateSelect").value;
      const failReason = document.getElementById("failReasonInput").value.trim();
      const payload = await requestJson(`/api/v1/admin/distributor/withdrawals/${withdrawId}/debug-callback`, {
        method: "POST",
        body: JSON.stringify({ state, fail_reason: failReason }),
      });
      showToast(`模拟完成：${payload.data.status}`);
      await loadDetail();
    }

    document.getElementById("loadButton").addEventListener("click", async () => {
      try {
        await loadDetail();
      } catch (error) {
        showToast(error.message || "加载失败", true);
      }
    });
    document.getElementById("simulateButton").addEventListener("click", async () => {
      try {
        await simulateCallback();
      } catch (error) {
        showToast(error.message || "模拟失败", true);
      }
    });
  </script>
</body>
</html>
