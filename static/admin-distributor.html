<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分销申请审批台</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #14213d;
      --muted: #667085;
      --line: #e6ebf2;
      --primary: #1768ff;
      --primary-deep: #0f52d6;
      --success: #0f9f6e;
      --danger: #d64545;
      --warning: #b7791f;
      --shadow: 0 18px 50px rgba(20, 33, 61, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(23, 104, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .hero p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .hero-meta {
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 18px;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.92);
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .toolbar label {
      font-size: 13px;
      color: var(--muted);
    }
    select, button {
      border: 1px solid var(--line);
      border-radius: 12px;
      height: 42px;
      padding: 0 14px;
      font-size: 14px;
      background: #fff;
    }
    button {
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(23,104,255,0.14);
    }
    .btn-primary {
      color: #fff;
      border-color: var(--primary);
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-deep) 100%);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .stat {
      padding: 18px;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.92);
      box-shadow: var(--shadow);
    }
    .stat-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 30px;
      font-weight: 700;
    }
    .table-card {
      overflow: hidden;
      border-radius: 24px;
      background: rgba(255,255,255,0.96);
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      padding: 16px 14px;
      text-align: left;
      font-size: 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: rgba(244,247,251,0.85);
    }
    tbody td {
      padding: 16px 14px;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    tbody tr:last-child td {
      border-bottom: none;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .pill.pending { color: var(--warning); background: rgba(183,121,31,0.12); }
    .pill.approved { color: var(--success); background: rgba(15,159,110,0.12); }
    .pill.rejected { color: var(--danger); background: rgba(214,69,69,0.12); }
    .reason {
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-approve {
      color: #fff;
      background: linear-gradient(135deg, #18a56f 0%, #0f9f6e 100%);
      border-color: #0f9f6e;
    }
    .btn-reject {
      color: #fff;
      background: linear-gradient(135deg, #ef6a6a 0%, #d64545 100%);
      border-color: #d64545;
    }
    .empty {
      padding: 60px 18px;
      text-align: center;
      color: var(--muted);
    }
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .pagination-actions {
      display: flex;
      gap: 10px;
    }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      min-width: 220px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(20, 33, 61, 0.96);
      color: #fff;
      box-shadow: 0 18px 48px rgba(20, 33, 61, 0.24);
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: all .18s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 960px) {
      .table-card {
        overflow-x: auto;
      }
      table {
        min-width: 980px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>分销申请审批台</h1>
        <p>内部使用版审批页面，支持查看申请、通过审核、驳回并回写消息通知。</p>
      </div>
      <div class="hero-meta" id="heroMeta">正在连接后台...</div>
    </div>

    <div class="toolbar">
      <label for="statusFilter">状态筛选</label>
      <select id="statusFilter">
        <option value="">全部</option>
        <option value="pending">待审核</option>
        <option value="approved">已通过</option>
        <option value="rejected">已驳回</option>
      </select>
      <button class="btn-primary" id="refreshButton">刷新列表</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">总申请数</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">待审核</div>
        <div class="stat-value" id="pendingCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">已通过</div>
        <div class="stat-value" id="approvedCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">已驳回</div>
        <div class="stat-value" id="rejectedCount">0</div>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>申请编号</th>
            <th>申请人</th>
            <th>目标级别</th>
            <th>申请原因</th>
            <th>状态</th>
            <th>创建时间</th>
            <th>驳回原因</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="applicationTableBody">
          <tr><td colspan="8" class="empty">正在加载申请记录...</td></tr>
        </tbody>
      </table>
      <div class="pagination">
        <div id="pageInfo">第 1 页</div>
        <div class="pagination-actions">
          <button id="prevPageButton">上一页</button>
          <button id="nextPageButton">下一页</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = {
      page: 1,
      pageSize: 20,
      total: 0,
      pageTotal: 0,
      status: "",
      items: [],
    };

    const statusFilter = document.getElementById("statusFilter");
    const refreshButton = document.getElementById("refreshButton");
    const prevPageButton = document.getElementById("prevPageButton");
    const nextPageButton = document.getElementById("nextPageButton");
    const applicationTableBody = document.getElementById("applicationTableBody");
    const heroMeta = document.getElementById("heroMeta");
    const pageInfo = document.getElementById("pageInfo");
    const toast = document.getElementById("toast");

    function showToast(message, isError = false) {
      toast.textContent = message;
      toast.style.background = isError ? "rgba(160, 34, 34, 0.96)" : "rgba(20, 33, 61, 0.96)";
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function formatTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    function renderStats(items) {
      const pending = items.filter(item => item.status === "pending").length;
      const approved = items.filter(item => item.status === "approved").length;
      const rejected = items.filter(item => item.status === "rejected").length;
      document.getElementById("totalCount").textContent = String(state.total);
      document.getElementById("pendingCount").textContent = String(state.status ? pending : pending);
      document.getElementById("approvedCount").textContent = String(state.status ? approved : approved);
      document.getElementById("rejectedCount").textContent = String(state.status ? rejected : rejected);
    }

    function renderTable() {
      if (!state.items.length) {
        applicationTableBody.innerHTML = '<tr><td colspan="8" class="empty">当前筛选条件下没有申请记录</td></tr>';
      } else {
        applicationTableBody.innerHTML = state.items.map(item => `
          <tr>
            <td>${item.application_id}</td>
            <td>
              <div><strong>${item.real_name || "-"}</strong></div>
              <div class="reason">UID: ${item.user_id}<br/>手机号: ${item.phone || "-"}</div>
            </td>
            <td>${item.target_level}</td>
            <td class="reason">${item.reason || "-"}</td>
            <td><span class="pill ${item.status}">${item.status}</span></td>
            <td>${formatTime(item.created_at)}</td>
            <td class="reason">${item.reject_reason || "-"}</td>
            <td>
              ${item.status === "pending" ? `
                <div class="actions">
                  <button class="btn-approve" data-action="approve" data-id="${item.application_id}">通过</button>
                  <button class="btn-reject" data-action="reject" data-id="${item.application_id}">驳回</button>
                </div>
              ` : '<span class="reason">已处理</span>'}
            </td>
          </tr>
        `).join("");
      }
      pageInfo.textContent = `第 ${state.page} 页 / 共 ${Math.max(state.pageTotal, 1)} 页`;
      prevPageButton.disabled = state.page <= 1;
      nextPageButton.disabled = state.page >= Math.max(state.pageTotal, 1);
      heroMeta.textContent = `当前共 ${state.total} 条申请，筛选状态：${state.status || "全部"}`;
      renderStats(state.items);
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.code !== 0) {
        throw new Error(payload.message || `请求失败: ${response.status}`);
      }
      return payload;
    }

    async function loadApplications() {
      heroMeta.textContent = "正在加载申请记录...";
      const params = new URLSearchParams({
        page: String(state.page),
        page_size: String(state.pageSize),
      });
      if (state.status) {
        params.set("status", state.status);
      }
      try {
        const payload = await requestJson(`/api/v1/admin/distributor/applications?${params.toString()}`);
        state.items = payload.data.list;
        state.total = payload.data.total;
        state.pageTotal = payload.data.page_total;
        renderTable();
      } catch (error) {
        applicationTableBody.innerHTML = `<tr><td colspan="8" class="empty">加载失败：${error.message}</td></tr>`;
        heroMeta.textContent = "加载失败";
        showToast(error.message, true);
      }
    }

    async function reviewApplication(action, applicationId) {
      if (action === "reject") {
        const rejectReason = window.prompt("请输入驳回原因", "申请资料暂不满足要求");
        if (rejectReason === null) {
          return;
        }
        await requestJson(`/api/v1/admin/distributor/applications/${applicationId}/reject`, {
          method: "POST",
          body: JSON.stringify({ reject_reason: rejectReason }),
        });
        showToast("已驳回申请");
      } else {
        await requestJson(`/api/v1/admin/distributor/applications/${applicationId}/approve`, {
          method: "POST",
          body: JSON.stringify({}),
        });
        showToast("已通过申请");
      }
      await loadApplications();
    }

    applicationTableBody.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const { action, id } = button.dataset;
      button.disabled = true;
      try {
        await reviewApplication(action, id);
      } catch (error) {
        showToast(error.message, true);
      } finally {
        button.disabled = false;
      }
    });

    refreshButton.addEventListener("click", async () => {
      state.page = 1;
      state.status = statusFilter.value;
      await loadApplications();
    });

    statusFilter.addEventListener("change", async () => {
      state.page = 1;
      state.status = statusFilter.value;
      await loadApplications();
    });

    prevPageButton.addEventListener("click", async () => {
      if (state.page <= 1) return;
      state.page -= 1;
      await loadApplications();
    });

    nextPageButton.addEventListener("click", async () => {
      if (state.page >= Math.max(state.pageTotal, 1)) return;
      state.page += 1;
      await loadApplications();
    });

    loadApplications();
  </script>
</body>
</html>
