  /admin/image-templates:
    get:
      description: Returns all image templates without file binary data. Use GET /admin/image-templates/{id}
        to get the file as a base64 data URL. Templates are ordered by id ascending.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/handler.ImageTemplateListItem'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List image templates
      tags:
      - admin/image-templates
    post:
      consumes:
      - multipart/form-data
      description: 'Creates a new image template. All fields are submitted as multipart
        form data. The file field is optional; if provided it will be stored as the
        reference image for this template. image_intent controls how the LLM generates
        the image: ''default'' = standard prompt, ''chart'' = data chart, ''decision_chart''
        = two-step JSON extraction then chart rendering.'
      parameters:
      - description: Template title
        in: formData
        name: image_title
        required: true
        type: string
      - description: Prompt content / description for LLM
        in: formData
        name: image_content
        type: string
      - description: Associated section ID (e.g. 1.1)
        in: formData
        name: section_id
        type: string
      - description: 'Image generation intent: default/chart/decision_chart'
        in: formData
        name: image_intent
        type: string
      - description: Reference image file (PNG/JPG)
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.ImageTemplateListItem'
              type: object
        "400":
          description: Missing image_title or file read error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create image template (multipart/form-data)
      tags:
      - admin/image-templates
  /admin/image-templates/{id}:
    delete:
      description: Permanently deletes the image template and its associated file
        data. This action is irreversible.
      parameters:
      - description: Image template ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Image template not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete image template
      tags:
      - admin/image-templates
    get:
      description: Returns the full image template record. file_data_url is a base64-encoded
        data URL (e.g. data:image/png;base64,...) suitable for direct use in an <img>
        src attribute. The field is omitted if no file has been uploaded.
      parameters:
      - description: Image template ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.ImageTemplateDetailItem'
              type: object
        "404":
          description: Image template not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get image template by id (includes file as base64 data URL)
      tags:
      - admin/image-templates
    put:
      consumes:
      - multipart/form-data
      description: Updates an existing image template. Only supplied fields are changed.
        If a new file is uploaded it replaces the previous reference image. If no
        file is uploaded the existing file is preserved.
      parameters:
      - description: Image template ID
        in: path
        name: id
        required: true
        type: integer
      - description: Template title
        in: formData
        name: image_title
        type: string
      - description: Prompt content / description for LLM
        in: formData
        name: image_content
        type: string
      - description: Associated section ID (e.g. 1.1)
        in: formData
        name: section_id
        type: string
      - description: 'Image generation intent: default/chart/decision_chart'
        in: formData
        name: image_intent
        type: string
      - description: New reference image file (PNG/JPG)
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Updated template
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.ImageTemplateListItem'
              type: object
        "404":
          description: Image template not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update image template (multipart/form-data)
      tags:
      - admin/image-templates
  /admin/image-templates/{id}/file:
    get:
      description: Returns the raw binary file stored for this template. The Content-Type
