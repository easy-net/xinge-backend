            - $ref: '#/definitions/handler.MPResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPReportLinksData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 获取报告链接（预览 H5 / 完整 H5 / PDF）
      tags:
      - mp/reports
  /mp/reports/list:
    post:
      consumes:
      - application/json
      description: 分页返回当前用户的所有报告，按创建时间倒序。每个报告附带最新订单信息。
      parameters:
      - description: wx.login() 临时 code
        in: header
        name: X-Login-Code
        required: true
        type: string
      - description: 系统版本
        in: header
        name: X-System-Version
        required: true
        type: string
      - description: 设备标识
        in: header
        name: X-Device-UUID
        required: true
        type: string
      - description: 分页参数
        in: body
        name: body
        schema:
          $ref: '#/definitions/handler.MPPageReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPPageResponse'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/handler.MPPageDataDoc'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/handler.MPReportListItem'
                        type: array
                    type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 获取我的报告列表
      tags:
      - mp/reports
  /mp/reports/status:
    post:
      consumes:
      - application/json
      description: 前端每 3~5 秒轮询，直到 status 为 completed 或 failed。progress.completion_rate
        用于进度条。
      parameters:
      - description: wx.login() 临时 code
        in: header
        name: X-Login-Code
        required: true
        type: string
      - description: 系统版本
        in: header
        name: X-System-Version
        required: true
        type: string
      - description: 设备标识
        in: header
        name: X-Device-UUID
        required: true
        type: string
      - description: report_id
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.MPReportIDReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPReportStatusData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 查询报告生成进度
      tags:
      - mp/reports
  /mp/schools/detail:
    post:
      consumes:
      - application/json
      description: 根据学校名称，返回该校全量学院+专业嵌套数据。前端本地做「选学院 → 选专业」级联联动，无需再次请求后端。
      parameters:
      - description: 学校名称
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.MPSchoolDetailReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPPublicResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPSchoolDetailData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "404":
          description: 学校不存在
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 获取学校详情（含学院和专业，公开接口）
      tags:
      - mp/schools
  /mp/schools/list:
    post:
      consumes:
      - application/json
      description: 支持关键词、城市、985/211 等条件检索，分页返回学校基础信息列表（不含学院和专业）。适用于「填写报告时搜索学校」场景。
      parameters:
      - description: 搜索条件
        in: body
        name: body
        schema:
          $ref: '#/definitions/handler.MPSchoolListReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPPublicResponse'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/handler.MPPageDataDoc'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/handler.MPSchoolItem'
                        type: array
                    type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 搜索学校列表（公开接口）
      tags:
      - mp/schools
  /mp/users/me:
    post:
      consumes:
      - application/json
      description: 返回登录用户的全量信息，含报告数、未读消息数、分销商状态。
      parameters:
      - description: wx.login() 临时 code
        in: header
        name: X-Login-Code
        required: true
        type: string
      - description: 系统版本
        in: header
        name: X-System-Version
        required: true
        type: string
      - description: 设备标识
        in: header
        name: X-Device-UUID
        required: true
        type: string
      - description: 空对象
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPMeData'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 获取当前用户信息
      tags:
      - mp/users
  /mp/users/me/update:
    post:
      consumes:
      - application/json
      description: 更新当前登录用户的昵称和头像 URL。
      parameters:
      - description: wx.login() 临时 code
        in: header
        name: X-Login-Code
        required: true
        type: string
      - description: 系统版本
        in: header
        name: X-System-Version
        required: true
        type: string
      - description: 设备标识
        in: header
        name: X-Device-UUID
        required: true
        type: string
      - description: 昵称和头像
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.MPUpdateMeReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPUpdateMeData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 更新用户信息（昵称 / 头像）
      tags:
      - mp/users
  /orders:
    post:
      consumes:
      - application/json
      description: 为学员创建待支付订单，返回订单ID供后续确认支付。
      parameters:
      - description: 创建订单请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Order'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 创建支付订单
      tags:
      - orders
  /orders/{id}:
    get:
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Order'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 查询订单详情
      tags:
      - orders
  /orders/{id}/pay:
    post:
      consumes:
      - application/json
      description: 标记订单为已支付，自动提交学员的报告生成任务。支持可选节点过滤（node_ids）。
      parameters:
      - description: 订单ID
        in: path
        name: id
        required: true
        type: integer
      - description: 可选：指定流水号和节点过滤
        in: body
        name: body
        schema:
          $ref: '#/definitions/handler.PayOrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.PayOrderResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 确认订单支付并触发报告生成
      tags:
      - orders
  /reports/{student_id}/images/{section_id}:
    get:
      description: Returns a COS pre-signed URL (valid 1h) and the prompt used to
        generate the image
      parameters:
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: integer
      - description: Section ID (e.g. 1.1)
        in: path
        name: section_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.ImageResultResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get image result for a section (presigned URL + prompt)
      tags:
      - reports
  /reports/{student_id}/orders:
    get:
      parameters:
      - description: 学员ID
        in: path
        name: student_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Order'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: 查询学员的所有订单
      tags:
      - orders
  /reports/{student_id}/pdf:
    get:
      description: Returns a COS pre-signed URL valid for 1 hour
      parameters:
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.PDFDownloadResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get pre-signed PDF download URL
      tags:
      - reports
  /reports/{student_id}/sections:
    get:
      description: Returns all completed report sections for the given student, ordered
        by section_id. Each item contains section_id, content (full generated text),
        the LLM prompt used, and updated_at timestamp.
      parameters:
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ReportSection'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List all generated sections for a student
      tags:
      - reports
  /reports/{student_id}/sections/{section_id}:
    get:
      description: Returns the generated text content and the original LLM prompt
        for a single section. Only the latest generated version is stored (UPSERT).
        Returns 404 if the section has not yet been generated.
      parameters:
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: integer
      - description: Section ID (e.g. 1.1, 2.3)
        in: path
        name: section_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.ReportSection'
              type: object
        "404":
          description: Section not yet generated
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a specific report section
      tags:
      - reports
  /reports/{student_id}/status:
    get:
      description: Returns task counts and completion_rate (done/total) for a student's
        report. completion_rate is 0 if total=0.
      parameters:
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.ReportStatusResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get report generation status
      tags:
      - reports
  /reports/{student_id}/submit:
    post:
      consumes:
      - application/json
      description: Creates the full task DAG for a student report based on the active
        task template. Each node in the template becomes a sub-task with dependency
        relationships automatically resolved. Pass node_ids to selectively run only
        specific sub-tasks (e.g. regenerate one section); omit node_ids to run the
        complete report pipeline. The main task (generate_report) is always created
        as the parent. Tasks are processed asynchronously by background workers.
      parameters:
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: integer
      - description: 'Optional: select specific node IDs to run'
        in: body
        name: body
        schema:
          $ref: '#/definitions/handler.SubmitRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.SubmitResponse'
              type: object
        "400":
          description: Invalid student_id
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Task creation failed
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit report generation request
      tags:
      - reports
  /reports/{student_id}/tasks:
    get:
      description: Returns paginated main tasks (parent_id=NULL) for the given student,
        optionally filtered by status. Each item includes sub_total (total sub-tasks),
        sub_done (completed sub-tasks), and completion_rate (sub_done/sub_total, 0
        if no sub-tasks). Use GET /tasks/{id}/subs to fetch the sub-tasks of a specific
        main task.
      parameters:
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: integer
      - description: Filter by status
        enum:
        - pending
        - running
        - done
        - failed
        in: query
        name: status
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size 1-100 (default 20)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/handler.TaskWithProgress'
                        type: array
                    type: object
              type: object
      security:
      - BearerAuth: []
      summary: List main tasks for a student
      tags:
      - tasks
  /tasks/{id}:
    delete:
      description: Sets cancel_requested=true on the task. Pending tasks will never
        be picked up. Running tasks check this flag at each key step and abort early.
        Already-completed tasks return 409 Conflict.
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: Task cancellation requested
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Task already completed, cannot cancel
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cancel a task
      tags:
      - tasks
    get:
      description: Returns the full task record including type, status, section_id,
        depends_on (array of prerequisite task IDs), error message, retry_count, and
        timing fields (created_at, started_at, finished_at).
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Task'
              type: object
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a single task
      tags:
      - tasks
  /tasks/{id}/retry:
    post:
      description: Resets the task status back to pending so it will be picked up
        by a worker on the next poll. Pass with_parent=true to also reset the parent
        main-task (useful when the main task is stuck in failed state after all sub-tasks
        are retried).
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      - description: Also reset the parent main-task to pending (default false)
        in: query
        name: with_parent
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: data is null on success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Invalid task id
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Reset failed
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Retry a failed task (reset to pending)
      tags:
      - tasks
  /tasks/{id}/subs:
    get:
      description: Returns all sub-tasks belonging to the given parent task. Each
        sub-task has a type (prefill_module, generate_section, generate_image, generate_pdf),
        section_id, depends_on (array of task IDs this task waits for), status, and
        timing fields.
      parameters:
      - description: Parent main-task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Task'
                  type: array
              type: object
        "400":
          description: Invalid task id
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List sub-tasks of a main task
      tags:
      - tasks
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
