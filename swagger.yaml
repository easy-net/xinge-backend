        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.StudentInfo'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
