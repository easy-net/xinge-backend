  /admin/task-template:
    get:
      description: Returns the task template tree stored in the settings table (key=task_template).
        The template defines all nodes (prefill, sections, images, pdf) and their
        dependency graph used when submitting a report. The response data is the raw
        JSON value (not wrapped in a typed struct).
      produces:
      - application/json
      responses:
        "200":
          description: data contains the raw template JSON object
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get current task template JSON
      tags:
      - tasks
    put:
      consumes:
      - application/json
      description: Replaces the task template in the settings table. The value field
        must be a valid JSON string representing a TaskTemplate object (nodes array
        with id, name, type, section_id, depends_on, enabled fields). Invalid JSON
        will be rejected with 400.
      parameters:
      - description: '{\'
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: data is null on success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Missing value field or invalid JSON
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Save task template JSON
      tags:
      - tasks
  /admin/tasks:
    get:
      description: Returns paginated main tasks (parent_id=NULL) across all students.
        Filter by student_id and/or status. Results are sorted by created_at descending.
        Sub-tasks are not included; use GET /tasks/{id}/subs for those.
      parameters:
      - description: Filter by student ID
        in: query
        name: student_id
        type: integer
      - description: Filter by status
        enum:
        - pending
        - running
        - done
        - failed
        in: query
        name: status
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size 1-100 (default 20)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.Task'
                        type: array
                    type: object
              type: object
      security:
      - BearerAuth: []
      summary: List all main tasks (admin)
      tags:
      - tasks
  /admin/tasks/single:
    post:
      consumes:
      - application/json
      description: Creates a main task (generate_report) and one sub-task for the
        given task_type + section_id. Useful for regenerating a single chapter from
        the template management page without rerunning the full pipeline. The sub-task
        is queued immediately and picked up by the next available worker.
      parameters:
      - description: Task details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.SubmitSingleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.SubmitSingleResponse'
              type: object
        "400":
          description: Missing required fields or invalid task_type
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger a single sub-task for a specific section
      tags:
      - reports
  /admin/template-versions/{id}/rollback:
    post:
      description: Activates the specified version and archives the current active
        version. The version ID can be found via GET /admin/templates/{section_id}/{type}/versions.
        After rollback the specified version becomes the active one used in future
        report generation.
      parameters:
      - description: Template version ID to rollback to
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: Rollback successful
        "404":
          description: Template version not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Rollback to a specific template version
      tags:
      - admin/templates
  /admin/templates:
    get:
      description: Returns all active templates grouped as a tree by section. Each
        leaf node contains section_id, template_type (text|image|pdf), version, status,
        and created_at. The content field is omitted in the tree view to reduce payload
        size — use GET /admin/templates/{section_id}/{type} to fetch the full content.
      produces:
      - application/json
      responses:
        "200":
          description: List of active templates (content omitted)
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ReportTemplate'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: Get template tree view
      tags:
      - admin/templates
  /admin/templates/{section_id}/{type}:
    get:
      description: Returns the currently active template version for the given section
        and type. The content field contains the full prompt template text. If no
        active version exists for the given combination, 404 is returned.
      parameters:
      - description: Section ID (e.g. 1.1, 2.3)
        in: path
        name: section_id
        required: true
        type: string
      - description: Template type
        enum:
        - text
        - image
        - pdf
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Active template with full content
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.ReportTemplate'
              type: object
        "404":
          description: No active template found for this section+type
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get active template for section+type
      tags:
      - admin/templates
    post:
      consumes:
      - application/json
      description: Creates a new version for the given section+type and automatically
        archives the previous active version. Version numbers are auto-incremented.
        The new version becomes immediately active and will be used in the next report
        generation.
      parameters:
      - description: Section ID (e.g. 1.1)
        in: path
        name: section_id
        required: true
        type: string
      - description: Template type
        enum:
        - text
        - image
        - pdf
        in: path
        name: type
        required: true
        type: string
      - description: Template content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.SaveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Newly created active version
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.ReportTemplate'
              type: object
        "400":
          description: Missing content
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Save new template version
      tags:
      - admin/templates
  /admin/templates/{section_id}/{type}/versions:
    get:
      description: Returns all versions (active and archived) for the given section
        and template type, sorted by version descending. Use this to browse history
        and find a version ID for rollback.
      parameters:
      - description: Section ID (e.g. 1.1)
        in: path
        name: section_id
        required: true
        type: string
      - description: Template type
        enum:
        - text
        - image
        - pdf
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ReportTemplate'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: List all versions for a section+type
      tags:
      - admin/templates
  /admin/users:
    get:
      description: Admin lists all users with pagination. Returns users sorted by
        id ascending. Password hash is never included in the response.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size 1-100 (default 20)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.User'
                        type: array
                    type: object
              type: object
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: 'Admin creates a new user account. Role must be one of: admin (full
        access), operator (can submit/manage tasks), viewer (read-only). Username
        must be unique.'
      parameters:
      - description: User info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created user (password field omitted)
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.User'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Username already exists
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - users
  /admin/users/{id}:
    delete:
      description: Admin permanently deletes a user. You cannot delete your own account
        (returns 403). This action is irreversible.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid user id
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Cannot delete yourself
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - users
    get:
      description: Returns a single user's information. Password hash is never included.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.User'
              type: object
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: 'Admin changes a user''s role. Role must be one of: admin, operator,
        viewer.'
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: New role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated user object
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.User'
              type: object
        "400":
          description: Invalid role value
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user role
      tags:
      - users
  /admin/users/{id}/password:
    put:
      consumes:
      - application/json
      description: Admin resets any user's password. The new password is immediately
        hashed with bcrypt. The user's existing JWT tokens remain valid until they
        expire.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: New password (min 6, max 128 chars)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: data is null on success
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Invalid id or weak password
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change user password
      tags:
      - users
  /auth/login:
    post:
      consumes:
      - application/json
      description: 'Authenticate with username and password. Returns a signed JWT
        Bearer token valid for 24 hours. Include the token in subsequent requests
        as: Authorization: Bearer <token>'
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.LoginResponse'
              type: object
        "400":
          description: Missing or invalid fields
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Wrong username or password
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Invalidates the current session. JWT is stateless so the server
        does not maintain a blocklist by default — the client must discard the token.
        A Redis-based revocation list can be added here if needed.
      produces:
      - application/json
      responses:
        "200":
          description: data is null
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the authenticated user's profile based on the JWT token
        in the Authorization header. Password hash is never returned.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.User'
              type: object
        "401":
          description: Token missing or invalid
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - auth
  /mp/auth/bind-phone:
    post:
      consumes:
      - application/json
      description: 首次登录后引导用户授权手机号。小程序调用 wx.getPhoneNumber() 拿到 phone_code，后端解密并 AES-256-GCM
        加密存库，对外返回脱敏手机号。
      parameters:
      - description: wx.login() 临时 code
        in: header
        name: X-Login-Code
        required: true
        type: string
      - description: 系统版本
        in: header
        name: X-System-Version
        required: true
        type: string
      - description: 设备标识
        in: header
        name: X-Device-UUID
        required: true
        type: string
      - description: phone_code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.MPBindPhoneReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPBindPhoneData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 绑定手机号
      tags:
      - mp/auth
  /mp/auth/login:
    post:
      consumes:
      - application/json
      description: 小程序调用 wx.login() 拿到 login_code 放入 Header X-Login-Code，后端 code2session
        换取 openid，查找或新建用户。扫分销商码进入时 body 传 distributor_id。
      parameters:
      - description: wx.login() 返回的临时 code
        in: header
        name: X-Login-Code
        required: true
        type: string
      - description: 系统版本，如 iOS 17.0
        in: header
        name: X-System-Version
        required: true
        type: string
      - description: 设备唯一标识
        in: header
        name: X-Device-UUID
        required: true
        type: string
      - description: 可选：分销商 ID
        in: body
        name: body
        schema:
          $ref: '#/definitions/handler.MPLoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPLoginData'
              type: object
        "400":
          description: 微信 login_code 无效
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 微信登录 / 自动注册
      tags:
      - mp/auth
  /mp/config/product:
    post:
      consumes:
      - application/json
      description: 返回当前报告价格、折扣信息、限时优惠结束时间以及展示用使用人数。无需 X-Login-Code。
      parameters:
      - description: 空对象
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPPublicResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPProductConfigData'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 获取报告价格与使用人数（公开接口）
      tags:
      - mp/orders
  /mp/distributor/application/status:
    post:
      consumes:
      - application/json
      description: 返回当前用户最新一条申请记录的状态。
      parameters:
      - description: wx.login() 临时 code
        in: header
        name: X-Login-Code
        required: true
        type: string
      - description: 系统版本
        in: header
        name: X-System-Version
        required: true
        type: string
      - description: 设备标识
        in: header
        name: X-Device-UUID
        required: true
        type: string
      - description: 空对象
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPApplicationStatusData'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "404":
          description: 暂无申请记录
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
      summary: 查询分销商申请状态
      tags:
      - mp/distributor
  /mp/distributor/apply:
    post:
      consumes:
      - application/json
      description: 普通用户主动提交申请，等待管理后台人工审核。审核结果通过消息通知。
      parameters:
      - description: wx.login() 临时 code
        in: header
        name: X-Login-Code
        required: true
        type: string
      - description: 系统版本
        in: header
        name: X-System-Version
        required: true
        type: string
      - description: 设备标识
        in: header
        name: X-Device-UUID
        required: true
        type: string
      - description: 申请信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.MPDistributorApplyReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.MPResponse'
            - properties:
                data:
                  $ref: '#/definitions/handler.MPDistributorApplyData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "409":
          description: 审核中，请勿重复申请
          schema:
            $ref: '#/definitions/handler.MPErrorResp'
        "500":
          description: Internal Server Error
